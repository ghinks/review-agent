name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync
      - name: Lint with Ruff
        run: uv run ruff check src
      - name: Type check with Mypy
        run: uv run mypy src
      - name: Run Tests
        run: |
          uv run pytest || status=$?
          if [ "${status:-0}" -eq 5 ]; then
            echo "No tests collected; continuing"
            exit 0
          fi
          exit "${status:-0}"
